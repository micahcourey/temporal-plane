[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "temporal-plane"
version = "0.1.0"
description = "Python binding scaffold for Temporal Plane"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Micah Courey" }]

[tool.setuptools.packages.find]
where = ["."]
include = ["temporal_plane*"]
