name: Publish Python

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: python
        run: pytest

  build-sdist:
    name: Build source distribution
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build twine

      - name: Build source distribution
        working-directory: python
        run: python -m build --sdist

      - name: Validate package metadata
        working-directory: python
        run: python -m twine check --strict dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist/*.tar.gz

  build-bundled-wheels:
    name: Build bundled wheel (${{ matrix.label }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            cli_binary: target/release/mnemix
          - os: macos-latest
            label: macos-arm64
            cli_binary: target/release/mnemix
          - os: windows-latest
            label: windows-x86_64
            cli_binary: target/release/mnemix.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '27.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build CLI release binary
        run: cargo build --release -p mnemix-cli

      - name: Build and verify bundled wheel
        shell: bash
        env:
          PYTHON_BIN: python
          TP_CLI_BINARY: ${{ matrix.cli_binary }}
        run: ./scripts/check-python-bundled-wheel.sh

      - name: Upload bundled wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.label }}
          path: python/dist/*.whl

  publish:
    name: Publish to PyPI
    needs:
      - build-sdist
      - build-bundled-wheels
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install twine
        run: pip install twine

      - name: Validate all artifacts
        run: python -m twine check --strict dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
